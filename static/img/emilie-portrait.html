<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portrait of Émilie du Châtelet — Maurice Quentin de La Tour, c. 1740</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .toolbar {
      width: 100%;
      padding: 0.75rem 1.5rem;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid #444;
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: #fff; border-color: #888; }
    .toolbar-title {
      font-size: 0.85rem;
      color: #888;
    }
    .portrait-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 1rem;
    }
    .portrait-wrap img {
      max-width: 100%;
      max-height: calc(100vh - 140px);
      height: auto;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      display: block;
    }
    .caption {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      line-height: 1.5;
    }
    .caption a { color: #6db3f2; }
    .caption a:hover { color: #9dcbf7; }
  </style>
</head>
<body>

<div class="toolbar">
  <a class="back-btn" href="/EmilieDuChatelet/" onclick="if(history.length>1){history.back();return false;}">← Back</a>
  <span class="toolbar-title">Émilie du Châtelet · Portrait</span>
</div>

<div class="portrait-wrap">
  <img src="/EmilieDuChatelet/img/emilie-du-chatelet.jpg"
       alt="Portrait of Émilie du Châtelet by Maurice Quentin de La Tour, c. 1740">
  <p class="caption">
    Maurice Quentin de La Tour, <em>Portrait of Émilie du Châtelet</em>, c. 1740.<br>
    Public domain · <a href="https://commons.wikimedia.org/wiki/File:Emilie_Chatelet_portrait_by_Latour.jpg" target="_blank" rel="noopener">Wikimedia Commons</a>
  </p>
</div>

</body>
</html>
